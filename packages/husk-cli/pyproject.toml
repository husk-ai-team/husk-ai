[project]
name = "husk-ai"
version = "0.2.0"
description = "Husk — the visual debugger for AI agents (CLI). Installs the `husk-ai` command. Local-first, source-available (BUSL 1.1)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "BUSL-1.1" }
authors = [{ name = "Husk" }]
keywords = ["ai", "agents", "debugging", "opentelemetry", "langgraph", "cursor", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Debuggers",
]
dependencies = [
    "click>=8.1",
    "rich>=13.9",
    "uvicorn[standard]>=0.32",
    "husk-shared",
    "husk-studio-backend",
    # OTel SDK + OTLP/HTTP exporter so `husk-ai demo` can emit example traces
    # without a separate dev environment. The user gets a working demo with
    # just `pip install husk-ai`.
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.27",
]

[project.scripts]
husk-ai = "husk.cli:main"
# Back-compat alias so existing workflows that use `husk start` keep working
# inside the workspace. End users installing from PyPI use `husk-ai`.
husk = "husk.cli:main"

[project.urls]
Homepage = "https://husk.dev"
Documentation = "https://docs.husk.dev"
Repository = "https://github.com/husk-ai-team/husk-ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/husk"]
