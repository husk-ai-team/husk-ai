[project]
name = "husk-shared"
version = "0.1.0"
description = "Husk shared Pydantic schemas and enums (used by CLI, sandbox, backend)"
requires-python = ">=3.11"
license = { text = "BUSL-1.1" }
dependencies = [
    "pydantic>=2.9",
    "python-ulid>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/husk_shared"]
