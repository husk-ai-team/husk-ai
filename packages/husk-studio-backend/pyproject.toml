[project]
name = "husk-studio-backend"
version = "0.1.0"
description = "Husk Studio backend — FastAPI server with WebSocket trace stream and replay engine"
requires-python = ">=3.11"
license = { text = "BUSL-1.1" }
dependencies = [
    "husk-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.20",
    "websockets>=13",
    "pydantic>=2.9",
    "python-ulid>=3.0",
    "opentelemetry-proto>=1.27",
    "opentelemetry-semantic-conventions>=0.48b0",
    "protobuf>=4.25",
    "httpx>=0.27",
    "pyjwt>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/husk_studio_backend"]
